name: Build Windows EXE and macOS DMG
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed gallery.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE
        path: dist/gallery.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build macOS Application
      run: |
        pyinstaller --noconfirm --clean --windowed --name GalleryX gallery.py
    - name: Create DMG
      run: |
        mkdir -p dmg-root
        ditto dist/GalleryX.app dmg-root/GalleryX.app
        hdiutil create \
          -volname "GalleryX" \
          -srcfolder dmg-root \
          -ov \
          -format UDZO \
          dist/GalleryX.dmg
    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macOS-DMG
        path: dist/GalleryX.dmg
