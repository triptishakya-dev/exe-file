name: Build Windows EXE and macOS DMG
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed gallery.py
    - name: Package Windows ZIP
      run: |
        python package.py --platform windows
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-ZIP
        path: dist/GalleryX-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build macOS Application
      run: |
        pyinstaller --noconfirm --clean --windowed --name GalleryX gallery.py
    - name: Prepare DMG Content
      run: |
        python package.py --platform macos --action prepare-dmg
    - name: Create DMG
      run: |
        for i in {1..5}; do
          hdiutil create \
            -volname "GalleryX" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            dist/GalleryX.dmg && break || sleep 5;
        done
    - name: Package macOS ZIP
      run: |
        python package.py --platform macos --action zip-dmg
    - name: Upload macOS ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ZIP
        path: dist/GalleryX-macOS.zip
